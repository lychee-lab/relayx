name: Go CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Check shell scripts
        run: |
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/package_macos_pkg.sh

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Build package
        id: package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          version="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          target="relayx-${version}-${GOOS}-${GOARCH}"
          ext=""
          archive="${target}.tar.gz"

          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
            archive="${target}.zip"
          fi

          mkdir -p "dist/${target}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags="-s -w" -o "dist/${target}/relayx${ext}" ./cmd/relayx

          cp README.md LICENSE scripts/install.sh scripts/uninstall.sh "dist/${target}/"

          if [[ "${GOOS}" == "windows" ]]; then
            (cd dist && zip -qr "${archive}" "${target}")
          else
            (cd dist && tar -czf "${archive}" "${target}")
          fi

          echo "archive=dist/${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relayx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  macos-pkg:
    name: macOS pkg ${{ matrix.goarch }}
    runs-on: macos-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Build macOS installer package
        run: |
          set -euo pipefail

          version="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          scripts/package_macos_pkg.sh \
            --version "${version}" \
            --arch "${{ matrix.goarch }}" \
            --output-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relayx-macos-pkg-${{ matrix.goarch }}
          path: dist/*.pkg
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
      - macos-pkg
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum relayx-* > checksums.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/relayx-*
            dist/checksums.txt
